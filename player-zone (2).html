<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AG Player Zone">
<meta name="theme-color" content="#0a0a0f">
<title>AG Player Zone</title>
<link rel="manifest" href="./ag-player-manifest.json">
<link rel="apple-touch-icon" href="./ag-icon-192.png">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a0a0f;color:#f0f0f0;min-height:100vh;overscroll-behavior:none}
:root{--accent:#00e5ff;--accent2:#ff4d4d;--green:#39ff14;--surface:#13131a;--surface2:#1c1c26;--surface3:#24242f;--border:#2a2a38;--text:#f0f0f0;--muted:#8888a0}
.app{display:flex;flex-direction:column;height:100dvh;overflow:hidden}
.topbar{background:#0a0a0f;border-bottom:1px solid var(--border);padding:0 14px;display:flex;align-items:center;gap:10px;flex-shrink:0;height:56px;padding-top:env(safe-area-inset-top)}
.logo-wrap{flex:1;min-width:0}
.logo{font-size:18px;font-weight:800;letter-spacing:-0.5px;color:var(--accent)}
.logo span{color:var(--text)}
.logo-sub{font-size:10px;color:var(--muted);letter-spacing:0.5px;margin-top:1px}
.age-badge{background:var(--surface3);border:1px solid var(--border);border-radius:20px;padding:4px 10px;font-size:10px;color:var(--accent);white-space:nowrap;flex-shrink:0;font-weight:700}
.nav{display:flex;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto;scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 10px;border:none;background:transparent;color:var(--muted);font-size:9px;cursor:pointer;white-space:nowrap;transition:all 0.15s;flex-shrink:0;min-width:52px}
.nav-btn i{font-size:20px}
.nav-btn.active{color:var(--accent)}
.content{flex:1;overflow-y:auto;padding:16px;padding-bottom:28px;-webkit-overflow-scrolling:touch}
.section-title{font-size:22px;font-weight:800;margin-bottom:4px;letter-spacing:-0.5px}
.section-sub{font-size:13px;color:var(--muted);margin-bottom:20px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px}
.card-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 16px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:13px;cursor:pointer;transition:all 0.15s;font-family:inherit}
.btn:active{transform:scale(0.97)}
.btn-accent{background:var(--accent);color:#000;border-color:var(--accent);font-weight:700}
.btn-green{background:var(--green);color:#000;border-color:var(--green);font-weight:700}
.btn-sm{padding:7px 12px;font-size:12px;border-radius:8px}
.btn-full{width:100%;justify-content:center}
.btn-danger{background:rgba(255,77,77,0.12);color:#ff4d4d;border-color:rgba(255,77,77,0.3)}
.input{width:100%;padding:10px 12px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:15px;outline:none;font-family:inherit;-webkit-appearance:none}
.input:focus{border-color:var(--accent)}
.select{width:100%;padding:10px 12px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:15px;outline:none;cursor:pointer;font-family:inherit;-webkit-appearance:none}
.select:focus{border-color:var(--accent)}
.textarea{width:100%;padding:10px 12px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:15px;outline:none;resize:vertical;min-height:80px;font-family:inherit;-webkit-appearance:none}
.textarea:focus{border-color:var(--accent)}
.form-row{margin-bottom:12px}
.form-label{font-size:12px;color:var(--muted);margin-bottom:5px;display:block}
/* Profile */
.profile-hero{background:var(--surface2);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:14px;text-align:center;position:relative}
.profile-avatar{width:72px;height:72px;border-radius:50%;background:rgba(0,229,255,0.12);border:3px solid var(--accent);display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:800;color:var(--accent);margin:0 auto 12px}
.profile-name{font-size:20px;font-weight:800;margin-bottom:2px}
.profile-pos{font-size:13px;color:var(--muted);margin-bottom:10px}
.profile-stats{display:flex;justify-content:center;gap:20px;margin-top:10px}
.pstat{text-align:center}
.pstat-num{font-size:22px;font-weight:800;color:var(--accent)}
.pstat-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px}
/* Age brackets */
.age-cards{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.age-card{background:var(--surface);border:2px solid var(--border);border-radius:14px;padding:14px;cursor:pointer;text-align:center;transition:all 0.2s}
.age-card.selected{border-color:var(--accent);background:rgba(0,229,255,0.06)}
.age-card-icon{font-size:28px;margin-bottom:6px}
.age-card-label{font-size:13px;font-weight:700}
.age-card-range{font-size:11px;color:var(--muted);margin-top:2px}
/* Drills */
.drill-item{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px;position:relative}
.drill-item.done{border-color:var(--green);background:rgba(57,255,20,0.05)}
.drill-header{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.drill-icon{width:36px;height:36px;border-radius:8px;background:rgba(0,229,255,0.12);color:var(--accent);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px}
.drill-title{font-size:14px;font-weight:700;flex:1}
.drill-meta{font-size:11px;color:var(--muted);margin-bottom:8px}
.drill-desc{font-size:12px;color:var(--muted);line-height:1.5;margin-bottom:10px}
.drill-done-badge{position:absolute;top:12px;right:12px;background:var(--green);color:#000;border-radius:20px;padding:2px 8px;font-size:10px;font-weight:700}
/* Progress */
.goal-item{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px}
.goal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.goal-title{font-size:14px;font-weight:600}
.goal-pct{font-size:13px;font-weight:700;color:var(--accent)}
.goal-bar{height:6px;background:var(--surface3);border-radius:3px;overflow:hidden}
.goal-fill{height:100%;background:var(--accent);border-radius:3px;transition:width 0.4s}
.goal-fill.green{background:var(--green)}
.tab-pills{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.tab-pill{padding:6px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:12px;cursor:pointer;font-family:inherit}
.tab-pill.active{background:var(--accent);color:#000;border-color:var(--accent);font-weight:700}
/* AI */
.ai-bubble{background:var(--surface2);border:1px solid var(--border);border-radius:14px;border-top-left-radius:4px;padding:14px;margin-bottom:10px;font-size:14px;line-height:1.7}
.ai-bubble.user{background:rgba(0,229,255,0.06);border-color:rgba(0,229,255,0.2);border-radius:14px;border-top-right-radius:4px;margin-left:24px;font-size:13px}
.ai-label{font-size:11px;color:var(--muted);margin-bottom:6px;display:flex;align-items:center;gap:4px}
.loading-dots::after{content:'...';animation:dots 1.2s steps(4,end) infinite}
@keyframes dots{0%,100%{content:'.'}33%{content:'..'}66%{content:'...'}}
.quick-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.empty-state{text-align:center;padding:32px 20px;color:var(--muted)}
.empty-state i{font-size:36px;margin-bottom:10px;display:block;color:var(--accent)}
/* Position tips */
.pos-tip{background:var(--surface2);border-left:3px solid var(--accent);border-radius:0 10px 10px 0;padding:12px 14px;margin-bottom:10px;font-size:13px;line-height:1.6}
.pos-tip-title{font-size:12px;font-weight:700;color:var(--accent);margin-bottom:4px;text-transform:uppercase;letter-spacing:0.5px}
.big-num{font-size:36px;font-weight:800;color:var(--accent)}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center}
.stat-card-label{font-size:11px;color:var(--muted);margin-bottom:4px}
.count-badge{background:var(--surface3);border-radius:6px;padding:2px 8px;font-size:11px;color:var(--muted);margin-left:6px}
.setup-card{background:var(--surface2);border:2px dashed var(--border);border-radius:16px;padding:24px;text-align:center;margin-bottom:16px}
.setup-icon{font-size:48px;color:var(--accent);margin-bottom:12px}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="logo-wrap">
      <div class="logo">A&amp;G <span>PLAYER ZONE</span></div>
      <div class="logo-sub">Top Training, For all Levels</div>
    </div>
    <div class="age-badge" id="age-badge">SET UP</div>
  </div>
  <div class="nav" id="nav"></div>
  <div class="content" id="content"></div>
</div>

<script>
const TABS=[
  {id:'profile',label:'Profile',icon:'ti-user'},
  {id:'drills',label:'Drills',icon:'ti-run'},
  {id:'progress',label:'Progress',icon:'ti-chart-line'},
  {id:'tips',label:'Position Tips',icon:'ti-bulb'},
  {id:'ai',label:'AI Plan',icon:'ti-brain'},
];

const POSITIONS=['Goalkeeper','Centre Back','Full Back','Defensive Mid','Central Mid','Attacking Mid','Winger','Striker'];

const AGE_BRACKETS=[
  {id:'kids',label:'Kids',range:'5–11',icon:'⚽',color:'#39ff14'},
  {id:'u14',label:'Under 14',range:'12–13',icon:'🏃',color:'#00e5ff'},
  {id:'u16',label:'Under 16',range:'14–15',icon:'💪',color:'#ff9f4d'},
  {id:'u18',label:'Under 18',range:'16–17',icon:'🔥',color:'#ff4d4d'},
  {id:'adult',label:'Adult',range:'18–35',icon:'⚡',color:'#a855f7'},
  {id:'vet',label:'Veteran',range:'35+',icon:'🎯',color:'#e8ff3c'},
];

const DRILLS_BY_AGE = {
  kids:[
    {id:1,name:'Ball Juggling Challenge',mins:5,intensity:'Low',icon:'ti-ball-football',desc:'Keep the ball in the air using feet, thighs and head. Count your record each session. Try to beat it next time!',focus:'Touch & coordination'},
    {id:2,name:'Cone Dribble Slalom',mins:8,intensity:'Medium',icon:'ti-arrow-wave-right-up',desc:'Set out 6 cones in a line, 1m apart. Dribble in and out as fast as you can. Time yourself each run!',focus:'Close control'},
    {id:3,name:'Wall Passing',mins:10,intensity:'Low',icon:'ti-arrows-exchange',desc:'Stand 3m from a wall. Pass and control 20 times with each foot. Focus on a clean touch every time.',focus:'Passing & first touch'},
    {id:4,name:'Target Shooting',mins:10,intensity:'Medium',icon:'ti-target',desc:'Place 3 cones as targets in different corners of a small goal. Try to hit each target 5 times. Both feet!',focus:'Shooting accuracy'},
    {id:5,name:'Speed Ladder Fun',mins:8,intensity:'High',icon:'ti-ladder',desc:'In-out steps through a ladder or chalk marks on ground. Do 4 different patterns, 3 runs each. Have fun with it!',focus:'Footwork & agility'},
    {id:6,name:'Toe Taps on Ball',mins:5,intensity:'Low',icon:'ti-ball-football',desc:'Place ball on the ground. Alternate tapping the top of the ball with each foot as fast as you can. Count to 50!',focus:'Balance & coordination'},
    {id:7,name:'Inside-Outside Touches',mins:8,intensity:'Low',icon:'ti-arrows-left-right',desc:'Walk forward using inside then outside of foot to move ball side to side. Keep the ball close. 2 lengths of the garden.',focus:'Ball manipulation'},
    {id:8,name:'Pass & Chase',mins:10,intensity:'Medium',icon:'ti-run',desc:'Pass the ball against a wall or to a partner, then sprint to a cone 10m away and back before the ball returns. 15 reps.',focus:'Passing & movement'},
    {id:9,name:'Shooting Fun',mins:10,intensity:'Medium',icon:'ti-target-arrow',desc:'Set up a small goal. Take 10 shots from 8m using your strong foot, then 10 with your weak foot. Count your goals!',focus:'Shooting confidence'},
    {id:10,name:'Stop & Go Dribble',mins:8,intensity:'Medium',icon:'ti-player-pause',desc:'Dribble freely in a 10x10 area. When you call "stop" to yourself, freeze, look up, then go again. Builds awareness.',focus:'Dribbling & awareness'},
    {id:11,name:'Catch & Throw Heading',mins:8,intensity:'Low',icon:'ti-arrow-up',desc:'Throw the ball up to yourself and head it back into your hands. Focus on using your forehead. 20 reps.',focus:'Heading basics'},
    {id:12,name:'Square Cone Dribble',mins:10,intensity:'Medium',icon:'ti-square',desc:'Set 4 cones in a square, 5m apart. Dribble to each cone, stop the ball with your sole, turn and go to the next. 5 laps.',focus:'Control & turning'},
    {id:13,name:'Passing Accuracy Targets',mins:10,intensity:'Low',icon:'ti-circles-relation',desc:'Set up 5 cones 10m away as targets. Pass the ball at each cone trying to hit it. Record your score out of 5 each round.',focus:'Passing accuracy'},
    {id:14,name:'Hopscotch Footwork',mins:8,intensity:'High',icon:'ti-jump-rope',desc:'Mark a hopscotch grid with cones. Jump through on both feet, then single foot. Add a ball dribble for the advanced version.',focus:'Agility & coordination'},
    {id:15,name:'Cool-Down Juggle',mins:5,intensity:'Low',icon:'ti-ball-football',desc:'End every session with 5 minutes of relaxed juggling. No pressure — just enjoy the ball. Try new tricks!',focus:'Touch & enjoyment'},
  ],
  u14:[
    {id:16,name:'1v1 Cone Gates',mins:10,intensity:'High',icon:'ti-circles-relation',desc:'Set 4 cone gates in a 15x15 area. Dribble through as many gates as possible in 60s. Rest 30s. 5 reps.',focus:'Dribbling under pressure'},
    {id:17,name:'Passing Pattern: Triangle',mins:12,intensity:'Medium',icon:'ti-triangle',desc:'3 cones in a triangle 8m apart. Pass, follow your pass, and receive at the next cone. Progress to one touch.',focus:'Combination play'},
    {id:18,name:'Shooting From Range',mins:12,intensity:'Medium',icon:'ti-target-arrow',desc:'6 balls at 6 different positions outside the box. Strike each with purpose. Technique first, power second.',focus:'Finishing technique'},
    {id:19,name:'Agility T-Drill',mins:10,intensity:'High',icon:'ti-letters-t',desc:'Sprint forward 10m, side shuffle 5m left, shuffle 10m right, shuffle back, backpedal to start. Time every rep.',focus:'Acceleration & change of direction'},
    {id:20,name:'Receiving Under Pressure',mins:10,intensity:'Medium',icon:'ti-hand-stop',desc:'Have someone serve balls from different angles. Control, turn and play back. 30 reps each side. Stay on your toes.',focus:'First touch & turning'},
    {id:21,name:'Wall Pass Series',mins:10,intensity:'Medium',icon:'ti-arrows-exchange',desc:'Against a wall: inside pass, outside pass, laces. 20 reps each technique with both feet. Crisp and accurate.',focus:'Passing technique'},
    {id:22,name:'Weak Foot Walls',mins:10,intensity:'Low',icon:'ti-foot-print',desc:'20 minutes of wall passing using your weak foot only. Start slow, build confidence. This is the most important drill you can do.',focus:'Weak foot development'},
    {id:23,name:'Reactive Sprint Drill',mins:10,intensity:'High',icon:'ti-run',desc:'Stand with back to start line. On a signal, turn and sprint 20m. 8 reps. Works on reaction time and explosive start.',focus:'Reaction speed'},
    {id:24,name:'Juggling Challenge',mins:8,intensity:'Low',icon:'ti-ball-football',desc:'Beat your juggling record from last session. Try: feet only, thigh only, alternate feet-thigh, head sequence.',focus:'Touch & coordination'},
    {id:25,name:'Box to Box Stamina',mins:12,intensity:'High',icon:'ti-arrows-up-down',desc:'Mark two lines 30m apart. Jog one way, stride back, sprint both. Repeat 6 times with 45s rest. Builds match fitness.',focus:'Stamina & endurance'},
    {id:26,name:'Cruyff Turn & Shoot',mins:10,intensity:'Medium',icon:'ti-rotate-clockwise',desc:'Receive a pass, execute a Cruyff turn away from a cone "defender", and shoot on goal. 10 reps each side.',focus:'Turning & shooting'},
    {id:27,name:'Lateral Cone Hops',mins:8,intensity:'High',icon:'ti-arrows-left-right',desc:'5 cones in a line, 50cm apart. Hop sideways over each cone on both feet. Then single leg. 4 runs each.',focus:'Lateral quickness'},
    {id:28,name:'Lofted Pass Practice',mins:10,intensity:'Low',icon:'ti-arrow-up',desc:'From 20m, practice lofted passes to land on a target area. Lean back, strike through the bottom half of the ball. 15 reps.',focus:'Long passing'},
    {id:29,name:'First Time Finishing',mins:12,intensity:'Medium',icon:'ti-target',desc:'Have someone cross or pass to you in the box. Finish first time every rep. Work both feet. 20 finishes total.',focus:'First-time finishing'},
    {id:30,name:'5m Sprint Starts',mins:10,intensity:'High',icon:'ti-player-play',desc:'From various starting positions: seated, lying, back-to-goal. Explode into a 5m sprint. 12 reps. Pure acceleration.',focus:'Explosive acceleration'},
  ],
  u16:[
    {id:31,name:'Sprint Mechanics Circuit',mins:12,intensity:'High',icon:'ti-run',desc:'High knees 20m, bounding 20m, sprint 30m, walk back. 6 sets. Focus on arm drive and forward lean.',focus:'Speed & power'},
    {id:32,name:'Weak Foot Training',mins:15,intensity:'Medium',icon:'ti-foot-print',desc:'All passing, receiving and shooting with weak foot only. 20 passes, 10 shots, 5 mins dribbling. Do this every session.',focus:'Technical development'},
    {id:33,name:'Crossing & Finishing',mins:15,intensity:'Medium',icon:'ti-arrows-cross',desc:'Serve crosses from both wings to finishing zones. 10 deliveries each side. Attack the ball with conviction.',focus:'Aerial & finishing'},
    {id:34,name:'Pressing Solo Runs',mins:10,intensity:'High',icon:'ti-player-track-next',desc:'Sprint 15m to "press" a cone, recover 10m, sprint again. 8 reps each side. Simulate real match pressing intensity.',focus:'Pressing & recovery runs'},
    {id:35,name:'Decision Gate Drill',mins:12,intensity:'Medium',icon:'ti-git-branch',desc:'Have someone call a colour gate as you approach with the ball. React and drive through the correct gate. 20 reps.',focus:'Decision making'},
    {id:36,name:'Plyometric Ladder',mins:12,intensity:'High',icon:'ti-ladder',desc:'Single leg hops, double leg hops, in-out, lateral shuffles. 3 runs of each pattern. Focus on ground contact time.',focus:'Explosive power'},
    {id:37,name:'Turn & Shoot Combinations',mins:12,intensity:'Medium',icon:'ti-rotate-clockwise',desc:'Receive with back to goal, turn with inside or outside hook, shoot. Rotate through 5 different turns. 15 reps.',focus:'Turning & finishing'},
    {id:38,name:'Heading Accuracy',mins:10,intensity:'Medium',icon:'ti-arrow-up',desc:'Have someone throw the ball up from 3m away. Head down into target zones on the ground. 20 headers, both sides.',focus:'Heading technique'},
    {id:39,name:'Full Sprint Intervals',mins:15,intensity:'High',icon:'ti-heart-rate-monitor',desc:'Sprint 40m at full pace. Walk back. Rest 45s. Repeat 10 times. Builds true speed endurance for match play.',focus:'Speed endurance'},
    {id:40,name:'Dribble & Cut Drill',mins:10,intensity:'Medium',icon:'ti-arrow-wave-right-up',desc:'Dribble at pace toward a cone, cut inside with a stepover, then outside, then go. Repeat 3 different moves. 20 reps.',focus:'1v1 moves'},
    {id:41,name:'Long Range Shooting',mins:12,intensity:'Medium',icon:'ti-target-arrow',desc:'Strike from 25m. Focus on technique: standing foot, hip rotation, follow-through. Record how many hit the target.',focus:'Shooting power & accuracy'},
    {id:42,name:'Defensive Shape Solo',mins:10,intensity:'Low',icon:'ti-shield',desc:'Mark out positions of your defensive unit with cones. Move through each position and defensive scenario 15 times.',focus:'Positional defending'},
    {id:43,name:'Reaction Ball Drill',mins:10,intensity:'High',icon:'ti-bounce-right',desc:'Throw a ball hard against a wall at an angle, then react and control whatever comes back. 40 touches. Stay sharp.',focus:'Reaction & first touch'},
    {id:44,name:'Nordic Hamstring Curl',mins:10,intensity:'Medium',icon:'ti-arrow-down',desc:'Kneel on soft surface, feet anchored. Lower your body slowly to the ground using hamstrings. 3 sets of 6. Injury prevention gold.',focus:'Hamstring strength'},
    {id:45,name:'Box Jump Circuit',mins:12,intensity:'High',icon:'ti-arrow-up',desc:'Jump onto a sturdy box or step: two-foot jump, single leg left, single leg right. 3x10 each. Builds explosive leg power.',focus:'Explosive jumping'},
  ],
  u18:[
    {id:46,name:'Match Fitness Intervals',mins:15,intensity:'High',icon:'ti-heart-rate-monitor',desc:'90s at high intensity running, 30s jog. Repeat 8 times. Mirrors exact match demands of a competitive 90 minutes.',focus:'Match fitness'},
    {id:47,name:'Power Shooting',mins:12,intensity:'High',icon:'ti-arrow-big-right',desc:'Strike from outside box. Focus on hip rotation, standing foot placement, and full follow-through. 15 strikes each foot.',focus:'Striking power'},
    {id:48,name:'Positional Pattern Runs',mins:15,intensity:'Medium',icon:'ti-route',desc:'Map out your position\'s 5 most common runs from a real match. Practice each run 10 times with and without the ball.',focus:'Positional awareness'},
    {id:49,name:'Plyometric Circuit',mins:12,intensity:'High',icon:'ti-bounce-right',desc:'Box jumps x10, broad jumps x10, lateral bounds x10, squat jumps x10. 3 rounds, 60s rest between. Power development.',focus:'Explosive power'},
    {id:50,name:'1v1 Defending',mins:12,intensity:'High',icon:'ti-shield',desc:'Attacker vs defender in a 12x8 zone. Defender delays, stays low, does not dive in. 90s bouts, rotate roles.',focus:'Defensive technique'},
    {id:51,name:'Weak Foot Finishing',mins:12,intensity:'Medium',icon:'ti-foot-print',desc:'10 shots inside box, 10 from range, all weak foot. No excuses — elite players are two-footed. Track your record.',focus:'Weak foot finishing'},
    {id:52,name:'High Intensity Dribbling',mins:12,intensity:'High',icon:'ti-arrow-wave-right-up',desc:'Full pace dribbling through a cone course. 8 different courses, 3 runs each. Compete against your own best time.',focus:'Dribbling at pace'},
    {id:53,name:'Crossing Accuracy',mins:12,intensity:'Medium',icon:'ti-arrows-cross',desc:'From the byline and cutback position. Aim for zones: near post, far post, penalty spot. 10 crosses from each position.',focus:'Delivery quality'},
    {id:54,name:'Pre-Season Stamina Run',mins:20,intensity:'High',icon:'ti-run',desc:'Run at 70% effort for 20 mins non-stop. This is your base fitness builder. Do it twice a week pre-season.',focus:'Aerobic base'},

const DEFAULT_PROFILE = {
  name:'', pos:'Striker', age:'', ageBracket:'', goals:[], drillsDone:[], sessions:0, aiMessages:[]
};

let state = {
  tab:'profile',
  profile: {...DEFAULT_PROFILE},
  progressTab:'goals',
  aiLoading: false,
  drillFilter:'all',
};

function save(){try{localStorage.setItem('pzone1',JSON.stringify({profile:state.profile}))}catch(e){}}
function load(){try{const d=JSON.parse(localStorage.getItem('pzone1')||'null');if(d&&d.profile)state.profile=d.profile;}catch(e){}}
load();

function detectBracket(age){
  const a=parseInt(age);
  if(!a)return'';
  if(a<=11)return'kids';
  if(a<=13)return'u14';
  if(a<=15)return'u16';
  if(a<=17)return'u18';
  if(a<=35)return'adult';
  return'vet';
}

function bracketLabel(id){
  const b=AGE_BRACKETS.find(x=>x.id===id);
  return b?b.label:'';
}

function initials(name){return name.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase()||'?';}

function render(){
  const isSetup = !state.profile.name || !state.profile.ageBracket;
  document.getElementById('nav').innerHTML = TABS.map(t=>`<button class="nav-btn${state.tab===t.id?' active':''}" onclick="setTab('${t.id}')"><i class="ti ${t.icon}"></i>${t.label}</button>`).join('');
  const badge = document.getElementById('age-badge');
  badge.textContent = state.profile.ageBracket ? bracketLabel(state.profile.ageBracket).toUpperCase() : 'SET UP';

  const c = document.getElementById('content');
  const views={profile:renderProfile,drills:renderDrills,progress:renderProgress,tips:renderTips,ai:renderAI};
  c.innerHTML=(views[state.tab]||renderProfile)();
  attachHandlers();
}

function setTab(t){state.tab=t;render();}

/* ===== PROFILE ===== */
function renderProfile(){
  const p=state.profile;
  const isNew=!p.name||!p.ageBracket;
  if(isNew){
    return`<div class="section-title">Welcome 👋</div>
    <div class="section-sub">Set up your player profile to get started</div>
    <div class="setup-card">
      <div class="setup-icon"><i class="ti ti-user-plus"></i></div>

    </div>
    ${renderProfileForm(p)}`;
  }

    <div class="profile-avatar">${initials(p.name)}</div>
    <div class="profile-name">${p.name}</div>
    <div class="profile-pos">${p.pos} · ${bracketLabel(p.ageBracket)} · Age ${p.age}</div>
    <div class="profile-stats">
      <div class="pstat"><div class="pstat-num">${p.sessions||0}</div><div class="pstat-label">Sessions</div></div>
      <div class="pstat"><div class="pstat-num">${done}</div><div class="pstat-label">Drills Done</div></div>
      <div class="pstat"><div class="pstat-num">${(p.goals||[]).length}</div><div class="pstat-label">Goals Set</div></div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">Edit Profile</div>
    ${renderProfileForm(p)}
  </div>
  <div class="card" style="border-color:rgba(255,77,77,0.3)">
    <div class="card-title" style="color:#ff4d4d">Reset My Data</div>
    <p style="font-size:13px;color:var(--muted);margin-bottom:12px">This will clear all your sessions, drills, goals and AI chat. Your profile details will also be removed so you can start fresh.</p>
    <button class="btn btn-danger btn-full" onclick="clearMyData()"><i class="ti ti-trash"></i>Clear All My Data</button>
  </div>`;
}

function renderProfileForm(p){
  return`<div class="form-row"><label class="form-label">Your Name</label><input class="input" id="p-name" value="${p.name||''}" placeholder="Enter your name"></div>
  <div class="grid2">
    <div class="form-row"><label class="form-label">Age</label><input class="input" id="p-age" type="number" value="${p.age||''}" min="5" max="70" placeholder="Age"></div>
    <div class="form-row"><label class="form-label">Position</label><select class="select" id="p-pos">${POSITIONS.map(pos=>`<option${pos===p.pos?' selected':''}>${pos}</option>`).join('')}</select></div>
  </div>
  <div class="form-row"><label class="form-label">Age Group</label>
    <div class="age-cards">${AGE_BRACKETS.map(b=>`<div class="age-card${p.ageBracket===b.id?' selected':''}" onclick="selectBracket('${b.id}')">
      <div class="age-card-icon">${b.icon}</div>
      <div class="age-card-label">${b.label}</div>
      <div class="age-card-range">${b.range} yrs</div>
    </div>`).join('')}</div>
  </div>
  <button class="btn btn-accent btn-full" onclick="saveProfile()"><i class="ti ti-check"></i>Save Profile</button>`;
}

function selectBracket(id){state.profile.ageBracket=id;render();}
function saveProfile(){
  const name=document.getElementById('p-name')?.value||'';
  const age=document.getElementById('p-age')?.value||'';
  const pos=document.getElementById('p-pos')?.value||'Striker';
  if(!name){alert('Please enter your name');return;}
  if(!state.profile.ageBracket){
    state.profile.ageBracket=detectBracket(age)||'adult';
  }
  state.profile.name=name;
  state.profile.age=age;
  state.profile.pos=pos;
  save();render();
}
function clearMyData(){
  state.profile={...DEFAULT_PROFILE};
  try{localStorage.removeItem('pzone1');}catch(e){}
  state.tab='profile';
  render();
}

/* ===== DRILLS ===== */
function renderDrills(){
  const p=state.profile;
  if(!p.ageBracket)return`<div class="section-title">Drills</div><div class="empty-state"><i class="ti ti-user"></i>Set up your profile first to see drills for your age group.</div>`;
  const drills=DRILLS_BY_AGE[p.ageBracket]||[];
  const done=p.drillsDone||[];
  const filters=['all','Low','Medium','High'];
  const active=state.drillFilter||'all';
  const filtered=active==='all'?drills:drills.filter(d=>d.intensity===active);
  const doneCount=drills.filter(d=>done.includes(d.id)).length;
  return`<div class="section-title">Your Drills</div>
  <div class="section-sub">${bracketLabel(p.ageBracket)} · ${p.pos} · ${doneCount}/${drills.length} completed today</div>
  <div class="tab-pills">
    ${filters.map(f=>`<button class="tab-pill${active===f?' active':''}" onclick="setDrillFilter('${f}')">${f==='all'?'All':f+' Intensity'}</button>`).join('')}
  </div>
  ${filtered.map(d=>{
    const isDone=done.includes(d.id);
    return`<div class="drill-item${isDone?' done':''}">
      ${isDone?'<div class="drill-done-badge">✓ Done</div>':''}
      <div class="drill-header">
        <div class="drill-icon"><i class="ti ${d.icon}"></i></div>
        <div class="drill-title">${d.name}</div>
      </div>
      <div class="drill-meta">${d.mins} mins · ${d.intensity} Intensity · Focus: ${d.focus}</div>
      <div class="drill-desc">${d.desc}</div>
      <button class="btn btn-sm${isDone?' btn-danger':' btn-green'}" onclick="toggleDrill(${d.id})">
        <i class="ti ${isDone?'ti-x':'ti-check'}"></i>${isDone?'Mark Undone':'Mark Done'}
      </button>
    </div>`;
  }).join('')}
  <div style="margin-top:16px">
    <button class="btn btn-sm btn-full" onclick="logSession()"><i class="ti ti-device-floppy"></i>Log This Session</button>
  </div>`;
}

function setDrillFilter(f){state.drillFilter=f;render();}
function toggleDrill(id){
  if(!state.profile.drillsDone)state.profile.drillsDone=[];
  const idx=state.profile.drillsDone.indexOf(id);
  if(idx>-1)state.profile.drillsDone.splice(idx,1);
  else state.profile.drillsDone.push(id);
  save();render();
}
function logSession(){
  state.profile.sessions=(state.profile.sessions||0)+1;
  state.profile.drillsDone=[];
  save();
  alert('Session logged! Drills reset for next session.');
  render();
}

/* ===== PROGRESS ===== */
function renderProgress(){
  const p=state.profile;
  const goals=p.goals||[];
  return`<div class="section-title">Progress</div>
  <div class="section-sub">Track your goals and development</div>
  <div class="stat-grid">
    <div class="stat-card"><div class="stat-card-label">Sessions</div><div class="big-num">${p.sessions||0}</div></div>
    <div class="stat-card"><div class="stat-card-label">Goals Set</div><div class="big-num">${goals.length}</div></div>
  </div>
  <div class="tab-pills">
    <button class="tab-pill${state.progressTab==='goals'?' active':''}" onclick="setProgTab('goals')">My Goals</button>
    <button class="tab-pill${state.progressTab==='add'?' active':''}" onclick="setProgTab('add')">Add Goal</button>
  </div>
  ${state.progressTab==='goals'?renderGoalsList(goals):renderAddGoal()}`;
}

function renderGoalsList(goals){
  if(!goals.length)return`<div class="empty-state"><i class="ti ti-target"></i>No goals set yet. Tap "Add Goal" to get started.</div>`;
  return goals.map((g,i)=>`<div class="goal-item">
    <div class="goal-header">
      <div class="goal-title">${g.title}</div>
      <div class="goal-pct">${g.progress}%</div>
    </div>
    <div class="goal-bar"><div class="goal-fill${g.progress>=100?' green':''}" style="width:${g.progress}%"></div></div>
    <div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap">
      <button class="btn btn-sm" onclick="updateGoal(${i},-10)"><i class="ti ti-minus"></i>-10%</button>
      <button class="btn btn-sm btn-accent" onclick="updateGoal(${i},10)"><i class="ti ti-plus"></i>+10%</button>
      <button class="btn btn-sm btn-danger" onclick="removeGoal(${i})"><i class="ti ti-trash"></i></button>
    </div>
  </div>`).join('');
}

function renderAddGoal(){
  return`<div class="card">
    <div class="card-title">New Goal</div>
    <div class="form-row"><label class="form-label">Goal Title</label><input class="input" id="g-title" placeholder="e.g. Improve weak foot, Score 5 goals..."></div>
    <div class="form-row"><label class="form-label">Starting Progress (%)</label><input class="input" id="g-prog" type="number" value="0" min="0" max="100"></div>
    <button class="btn btn-accent btn-full" onclick="addGoal()"><i class="ti ti-plus"></i>Add Goal</button>
  </div>
  <div class="card" style="margin-top:0">
    <div class="card-title">Quick Goals</div>
    ${['Improve weak foot','Increase sprint speed','Better first touch','Score more goals','Improve heading','Better positioning','Increase stamina','Improve passing accuracy'].map(g=>`<button class="btn btn-sm" style="margin:4px" onclick="quickGoal('${g}')">${g}</button>`).join('')}
  </div>`;
}

function setProgTab(t){state.progressTab=t;render();}
function addGoal(){
  const title=document.getElementById('g-title')?.value;
  const prog=parseInt(document.getElementById('g-prog')?.value)||0;
  if(!title)return;
  if(!state.profile.goals)state.profile.goals=[];
  state.profile.goals.push({title,progress:Math.min(100,Math.max(0,prog))});
  save();state.progressTab='goals';render();
}
function quickGoal(title){
  if(!state.profile.goals)state.profile.goals=[];
  if(state.profile.goals.find(g=>g.title===title))return;
  state.profile.goals.push({title,progress:0});
  save();state.progressTab='goals';render();
}
function updateGoal(i,delta){
  const g=state.profile.goals[i];
  if(!g)return;
  g.progress=Math.min(100,Math.max(0,(g.progress||0)+delta));
  save();render();
}
function removeGoal(i){
  state.profile.goals.splice(i,1);
  save();render();
}

  return`<div class="section-title">Position Tips</div>
  <div class="section-sub">Advice tailored to your position</div>
  <div class="tab-pills">${allPos.map(pp=>`<button class="tab-pill${pp===pos?' active':''}" onclick="setTipPos('${pp}')">${pp}</button>`).join('')}</div>
  ${tips.map(t=>`<div class="pos-tip">
    <div class="pos-tip-title">${t.title}</div>
    ${t.tip}
  </div>`).join('')}`;
}
function setTipPos(pos){state.profile.pos=pos;save();render();}

/* ===== ADVICE LIBRARY ===== */
const ADVICE = {
  gym:{
    kids:`GYM PLAN - KIDS (5-11)\n\nAt this age, the best gym is the back garden! No weights needed — your body is the gym.\n\nDAILY MOVEMENT (15-20 mins)\n• Jumping jacks x20\n• Bunny hops forward and back x10\n• Bear crawls across the garden x4\n• Crab walks x4\n• Frog jumps x10\n\nFUNNY CHALLENGES\n• How many times can you jump over a ball without stopping?\n• Race yourself — how fast can you do 10 press-ups?\n• Balance on one leg for 30 seconds each side\n\nREMEMBER: At your age, playing football IS your training. The more you play, the stronger and faster you get. Have fun with it!`,
    u14:`GYM PLAN - UNDER 14\n\nNo gym membership needed. Bodyweight exercises build real football strength at this age.\n\nWARM UP (5 mins)\n• Jog on the spot, high knees, leg swings, arm circles\n\n3 DAYS PER WEEK\nCircuit — 3 rounds, 45s rest between rounds:\n• Press-ups x12\n• Squat jumps x10\n• Plank hold 30 seconds\n• Lunges x10 each leg\n• Calf raises x20\n• Mountain climbers x15\n\nSPEED WORK (2x per week)\n• 5x 20m sprints with 45s rest\n• Lateral shuffle 10m x6\n\nFLEXIBILITY\n• Stretch after every session — hamstrings, quads, hip flexors\n• Hold each stretch 30 seconds\n\nAvoid heavy weights until you are 16. Focus on explosive bodyweight movements that translate directly to football.`,
    u16:`GYM PLAN - UNDER 16\n\nYou can now start introducing light resistance training alongside bodyweight work.\n\n3 DAYS PER WEEK — STRENGTH\nDay 1: Lower Body\n• Goblet squat 3x12\n• Romanian deadlift (light) 3x10\n• Step-ups 3x10 each leg\n• Calf raises 3x20\n• Nordic hamstring curl 3x6\n\nDay 2: Upper Body and Core\n• Press-ups 3x15\n• Dumbbell rows 3x12\n• Shoulder press (light) 3x10\n• Plank 3x45s\n• Dead bug 3x10\n\nDay 3: Power and Speed\n• Box jumps 3x8\n• Broad jumps 3x6\n• Resisted sprints 6x20m\n• Lateral bounds 3x8 each\n\nNUTRITION TIP: Eat protein within 30 minutes of every gym session to help your muscles recover and grow.`,
    u18:`GYM PLAN - UNDER 18\n\nFull strength and power programme. This is when gym work really starts to pay off on the pitch.\n\n4 DAYS PER WEEK\nDay 1: Strength Lower\n• Back squat 4x5\n• Romanian deadlift 4x6\n• Bulgarian split squat 3x8 each\n• Hip thrust 3x10\n• Nordic curl 3x6\n\nDay 2: Power Upper\n• Bench press 4x6\n• Pull-ups 4x6\n• Dumbbell rows 3x10\n• Overhead press 3x8\n• Pallof press 3x10\n\nDay 3: Power Lower\n• Trap bar deadlift 4x4\n• Box jumps 4x5\n• Resisted sprints 8x20m\n• Lateral bounds 3x8\n\nDay 4: Athletic Development\n• Agility ladder 10 mins\n• Plyometric circuit 3 rounds\n• Core circuit 3 rounds\n• Mobility and stretching 15 mins\n\nRest at least one day between sessions. Sleep 8-9 hours — that is when your body actually gets stronger.`,
    adult:`GYM PLAN - ADULT\n\nBalance strength, power and injury prevention. Three days a week is enough alongside football training.\n\n3 DAYS PER WEEK\nDay 1: Lower Body Strength\n• Trap bar deadlift 4x5\n• Back squat 3x6\n• Single leg press 3x10 each\n• Hip thrust 3x12\n• Calf raises 3x15\n\nDay 2: Upper Body and Core\n• Bench press 3x8\n• Weighted pull-ups 3x6\n• Dumbbell rows 3x10\n• Overhead press 3x8\n• Cable rotations 3x12\n• Plank variations 3x45s\n\nDay 3: Power and Speed\n• Power cleans or jump squats 4x4\n• Box jumps 3x6\n• Resisted sprints 6x25m\n• Agility work 10 mins\n• Mobility circuit 10 mins\n\nKEY: Consistency beats intensity. Three solid sessions a week for a year will transform your game more than six sessions for a month.`,
    vet:`GYM PLAN - VETERAN (35+)\n\nFocus on maintaining strength, preventing injury and staying mobile. Quality over quantity every time.\n\n2-3 DAYS PER WEEK\nDay 1: Strength and Stability\n• Goblet squat 3x10\n• Romanian deadlift 3x10\n• Step-ups 3x10 each leg\n• Resistance band work 3x15\n• Single leg balance exercises 3x30s\n\nDay 2: Mobility and Movement\n• Full body foam roll 10 mins\n• Hip mobility circuit 10 mins\n• Yoga for footballers 15 mins\n• Light resistance band work\n• Balance and proprioception drills\n\nDay 3: Power Maintenance\n• Light jump squats 3x6\n• Medicine ball throws 3x8\n• Resisted walks 3x20m\n• Core circuit 3 rounds\n\nPRIORITY: Injury prevention is your number one goal. Hamstrings, hip flexors and knees need constant attention. Never skip your warm-up or cool-down.`

  nutrition:{
    kids:`NUTRITION - KIDS (5-11)\n\nFood is fuel for fun! Eating well helps you run faster, jump higher and play longer.\n\nEAT PLENTY OF\n• Pasta, rice and potatoes for energy\n• Chicken, eggs and fish to help muscles grow\n• Fruit and vegetables every day\n• Milk and dairy for strong bones\n\nBEFORE TRAINING\n• Eat a good meal 2 hours before\n• Try: pasta with sauce, rice and chicken, or a sandwich\n• Have a banana 30 mins before if you need a boost\n\nDURING TRAINING\n• Drink water every 15-20 minutes\n• Never train thirsty\n\nAFTER TRAINING\n• Eat within an hour — your body needs to refuel\n• Try: milk and banana, yoghurt, or eggs on toast\n\nAVOID: Fizzy drinks, too many sweets and crisps. They give you a quick burst of energy but make you tired quickly. Water is always the best drink!`,
    u14:`NUTRITION - UNDER 14\n\nYou are growing fast and training hard. Eating right will give you a massive advantage over players who do not bother.\n\nDAILY TARGETS\n• 5 portions of fruit and vegetables\n• Protein at every meal (chicken, eggs, fish, beans)\n• Complex carbs for energy (pasta, rice, oats, bread)\n• 2 litres of water minimum\n\nMEAL TIMING\nBreakfast: Porridge with fruit and honey, or eggs on toast\nLunch: Chicken wrap or pasta salad\nDinner: Rice or pasta with protein and vegetables\nSnacks: Fruit, nuts, yoghurt, milk\n\nPRE-TRAINING (2 hours before)\n• Carb-based meal — pasta, rice or bread\n• Avoid heavy or fatty food\n\nPOST-TRAINING (within 30 mins)\n• Protein and carbs together — chocolate milk is actually perfect\n• Or: eggs on toast, yoghurt with banana\n\nAVOID: Energy drinks — they are terrible for players your age and can affect your heart. Stick to water and milk.`,
    u16:`NUTRITION - UNDER 16\n\nAt this age nutrition can seriously separate you from other players. Most teens eat poorly — you do not have to.\n\nDAILY STRUCTURE\nBreakfast: Oats with protein (eggs or Greek yoghurt on the side)\nMid-morning: Fruit and handful of nuts\nLunch: Protein and carbs — chicken rice bowl, tuna pasta\nAfternoon: Banana or rice cakes with peanut butter\nDinner: Lean protein, vegetables and complex carbs\nBefore bed: Glass of milk or Greek yoghurt — supports overnight muscle recovery\n\nTRAINING DAYS\n• 3 hours before: Full carb-based meal\n• 1 hour before: Light snack — banana or rice cakes\n• During: Water every 15 mins\n• After: Protein and carbs within 30 mins\n\nHYDRATION\n• Aim for 2.5 litres of water per day\n• Urine should be pale yellow — dark yellow means dehydrated\n• Drink 500ml in the 2 hours before training\n\nSUPPLEMENTS: You do not need them at 16. Real food is better. Focus on eating well first.`,
    u18:`NUTRITION - UNDER 18\n\nYou are nearly fully developed. Dial in your nutrition now and it becomes a lifelong habit.\n\nCALORIE NEEDS\nOn training days you need plenty of fuel — do not undereat. Most players your age do not eat enough which limits their development.\n\nDAILY PLAN\nBreakfast: 3 eggs scrambled, 2 slices toast, glass of milk\nMid-morning: Greek yoghurt with fruit\nLunch: Large chicken or tuna pasta with salad\nPre-training: Banana and rice cakes 60 mins before\nPost-training: Protein shake or chocolate milk immediately after\nDinner: Lean protein (150-200g), large portion of rice or potato, vegetables\n\nKEY NUTRIENTS\n• Protein: Aim for 1.5g per kg of bodyweight daily\n• Carbs: Your main fuel — do not cut them\n• Iron: Red meat twice a week or dark green veg daily\n• Omega 3: Oily fish twice a week — reduces inflammation\n\nSLEEP AND RECOVERY: 8-9 hours sleep is as important as food. Growth hormone is released during deep sleep.`,
    adult:`NUTRITION - ADULT\n\nFuel performance and recover properly. Simple consistent habits beat any complicated diet plan.\n\nDAILY PRINCIPLES\n• Eat protein at every meal — 25-40g per sitting\n• Time carbs around training — eat them before and after\n• Reduce carbs on rest days\n• Eat plenty of vegetables — aim for half your plate\n• Stay hydrated — 2.5 to 3 litres of water daily\n\nPRE-MATCH OR TRAINING (3 hours before)\n• Rice or pasta with lean protein\n• Avoid high fat, high fibre foods — they slow digestion\n• 500ml water\n\nPOST-TRAINING (within 45 mins)\n• 25-40g protein plus carbs\n• Options: protein shake and banana, chicken and rice, eggs on toast\n\nWEEKLY HABITS\n• Oily fish twice a week (salmon, mackerel) — reduces joint inflammation\n• Limit alcohol — it seriously impairs recovery and sleep quality\n• Meal prep on Sunday — planning prevents poor choices\n\nALCOHOL: Even 2-3 drinks after a match significantly impairs recovery for 48-72 hours. Worth knowing.`,
    vet:`NUTRITION - VETERAN (35+)\n\nYour nutritional needs shift as you get older. Focus on anti-inflammatory foods, joint health and recovery.\n\nKEY PRIORITIES\n• Increase protein intake — older muscles need more to maintain mass\n• Anti-inflammatory foods — reduce joint soreness\n• Bone health — calcium and vitamin D become more important\n• Hydration — older bodies dehydrate faster\n\nDAILY PLAN\nBreakfast: Eggs, oats, berries and nuts\nMid-morning: Greek yoghurt\nLunch: Oily fish or chicken with salad and whole grains\nAfternoon: Handful of nuts and fruit\nDinner: Lean protein, lots of vegetables, moderate carbs\n\nANTI-INFLAMMATORY FOODS TO EAT MORE OF\n• Oily fish — salmon, mackerel, sardines (3x per week)\n• Berries — blueberries, cherries\n• Turmeric and ginger\n• Leafy green vegetables\n• Olive oil\n\nJOINT HEALTH\n• Consider glucosamine and omega 3 supplements\n• Stay well hydrated — joint fluid needs water\n• Collagen-rich foods help — bone broth, chicken skin\n\nALCOHOL: Has a significantly bigger impact on recovery at 35+ than it did at 25. Be honest with yourself about this.`
  },
  mindset:{
    kids:`MINDSET - KIDS (5-11)\n\nThe most important thing at your age is to ENJOY football. Players who enjoy it keep playing and get the best.\n\nBE BRAVE\n• Try new skills even if you might get them wrong\n• Everyone makes mistakes — even Messi and Ronaldo\n• The only bad shot is the one you did not take\n\nBE A GOOD TEAMMATE\n• Celebrate your teammates goals as much as your own\n• Help players up when they fall\n• Never shout at a teammate for making a mistake\n\nWHEN THINGS GO WRONG\n• Take a deep breath\n• Forget the mistake — focus on the next moment\n• Every great player has made thousands of mistakes\n\nPRE-MATCH ROUTINE\n• Eat well 2 hours before\n• Listen to your favourite music\n• Tell yourself three things you want to do well today\n\nREMEMBER: Win or lose, the best players always enjoy the game. Keep smiling!`,
    u14:`MINDSET - UNDER 14\n\nThis is the age where football gets more serious. Your mindset will separate you from players with equal ability.\n\nCONFIDENCE\n• Confidence comes from preparation — the more you train, the more confident you feel in a match\n• Talk to yourself positively — "I can do this" is more powerful than you think\n• Focus on what you CAN control: your effort, your attitude, your preparation\n\nDEALING WITH MISTAKES\n• Give yourself a 5-second rule — feel the frustration for 5 seconds, then let it go\n• Mistakes are information, not failures\n• The best players forget bad moments quickly and stay focused\n\nFOCUS\n• Stay present — the only moment that matters is right now\n• Do not worry about the score, worry about your next action\n• Look up and scan regularly — aware players make better decisions\n\nPRE-MATCH ROUTINE\n• Same routine every time builds mental readiness\n• Eat well, arrive early, warm up properly\n• Take 5 deep breaths before kick-off`,
    u16:`MINDSET - UNDER 16\n\nMental performance is where elite players are made. Technical ability gets you to a level — mindset takes you beyond it.\n\nCOMPETITIVE MINDSET\n• Embrace pressure — it means you care and it means you are in a situation worth caring about\n• Competition is a privilege. Not everyone gets to compete\n• Focus on the process, not the outcome — if you perform your best, the result takes care of itself\n\nCONFIDENCE UNDER PRESSURE\n• Visualise success before the match — spend 5 minutes imagining yourself playing well\n• Use a trigger word or phrase to reset after a mistake — "Next ball" or "Reset"\n• Body language matters — stand tall, chest out, even when things go wrong\n\nGROWTH MINDSET\n• Every training session is a chance to get 1% better\n• Seek feedback from your coach — players who ask for feedback improve fastest\n• Your biggest competition is who you were yesterday, not the player in front of you\n\nPRE-MATCH ROUTINE\n• Consistent warm-up routine\n• Music that puts you in the right headspace\n• Visualisation for 5 minutes\n• Focus on your role and your responsibilities`,
    u18:`MINDSET - UNDER 18\n\nAt this level the mental game is as important as the technical game. Players with equal ability are separated by mindset.\n\nELITE HABITS\n• Review every match or training session mentally — what went well, what to improve\n• Set specific goals for every training session, not just matches\n• Build a pre-match routine and stick to it religiously\n\nHANDLING PRESSURE\n• Pressure is a privilege — reframe it\n• Breathing technique: 4 seconds in, hold 4, out 6. Use this before a penalty or free kick\n• Pre-performance routine anchors your mind before big moments\n\nRESILIENCE\n• Every player faces setbacks — injury, bad form, being dropped\n• How you respond to setbacks defines your career more than the setbacks themselves\n• Keep a training journal — recording progress keeps perspective when things feel tough\n\nCOMMUNICATION\n• Talk on the pitch constantly — leaders communicate\n• Encourage teammates loudly, critique quietly\n• Body language is communication — make yours positive always`,
    adult:`MINDSET - ADULT\n\nAdult football brings different pressures — work, family, time. Managing these alongside your game is the real mental challenge.\n\nSTAYING MOTIVATED\n• Set a clear goal for the season — something specific and measurable\n• Find training partners who push you\n• Track your progress — seeing improvement fuels motivation\n\nPRE-MATCH PREPARATION\n• Start your mental preparation the night before — sleep well, eat well\n• On match day, reduce stress — do not rush, do not argue, stay calm\n• Arrive early, warm up properly — rushed preparation leads to poor starts\n\nDEALING WITH BAD FORM\n• Bad form is temporary — every player goes through it\n• Go back to basics in training — simple things done well rebuild confidence\n• Do not compare yourself to your best days, compare yourself to yesterday\n\nBALANCING FOOTBALL AND LIFE\n• When you are at training, be fully present — phone away, focus on the session\n• Quality over quantity — two great training sessions beat four half-hearted ones\n• Communicate with family and work about your commitment — honesty prevents resentment`,
    vet:`MINDSET - VETERAN (35+)\n\nExperience is your biggest asset. Lean into it while keeping the love of the game alive.\n\nEMBRACING YOUR AGE\n• Your experience and reading of the game is better than any younger player\n• Work smarter not harder — use your positional awareness to compensate for reduced pace\n• Your leadership and communication on the pitch is invaluable\n\nSTAYING MOTIVATED\n• Reconnect with why you started playing — the love of the game\n• Set process goals, not outcome goals — focus on how you play, not results\n• Enjoy the social side — football at this level is as much about community as competition\n\nMANAGING EXPECTATIONS\n• You will not be as fast as you were at 25 — that is fine\n• Your positional intelligence and composure more than compensates\n• Be patient with your body — it needs more time to prepare and recover\n\nPRE-MATCH ROUTINE\n• Longer warm-up — 20-25 minutes minimum\n• Mental preparation: focus on enjoying the game\n• Set one or two technical goals for the match — something to focus on that is in your control`
  },
  plan:{
    kids:`WEEKLY PLAN - KIDS (5-11)\n\nKeep it fun, keep it moving, keep it simple!\n\nMONDAY\nSchool day — active play at break times. Kick a ball against a wall for 10 mins after school.\n\nTUESDAY\nClub training or backyard session — 30 mins juggling, dribbling and shooting.\n\nWEDNESDAY\nRest or light activity — a walk or bike ride is perfect.\n\nTHURSDAY\nFitness fun — jumping jacks, races, bunny hops. Make it a game with a friend.\n\nFRIDAY\nLight ball work — juggling challenge, cone dribble. Try to beat your record.\n\nSATURDAY\nMatch day! Give everything, smile and enjoy it.\n\nSUNDAY\nRest and recovery. Eat well, sleep well. Watch some football and enjoy it.\n\nGOLDEN RULE: Every day you kick a ball is a good day. Even 10 minutes makes a difference over a whole year!`,
    u14:`WEEKLY PLAN - UNDER 14\n\nOne week of focused development. Stick to this consistently and you will improve fast.\n\nMONDAY\nGym circuit — 3 rounds bodyweight exercises\nFocus: press-ups, squats, lunges, plank\n\nTUESDAY\nTechnical session — 45 mins\nFocus: Weak foot wall passing, first touch, shooting\n\nWEDNESDAY\nActive recovery — light jog or swim, stretching\n\nTHURSDAY\nSpeed and agility — 30 mins\nFocus: Sprint drills, agility ladder, cone gates\n\nFRIDAY\nLight technical work — juggling, ball mastery, 20 mins only\n\nSATURDAY\nMatch or team training — give everything\n\nSUNDAY\nFull rest. Eat well, hydrate, sleep 9 hours.\n\nNUTRITION THIS WEEK: Eat protein at every meal. Drink 2 litres of water daily. Avoid energy drinks completely.`,
    u16:`WEEKLY PLAN - UNDER 16\n\nA structured week balancing gym, technical work and recovery.\n\nMONDAY\nGym — Lower body strength\nSquats, Romanian deadlift, step-ups, calf raises, Nordic curls\n\nTUESDAY\nTechnical — 60 mins\nWeak foot (20 mins), shooting (20 mins), combination play (20 mins)\n\nWEDNESDAY\nGym — Upper body and core\nPress-ups, rows, shoulder work, plank, dead bug, pallof press\n\nTHURSDAY\nSpeed and power — 45 mins\nSprint mechanics, plyometrics, agility work\n\nFRIDAY\nLight technical — 30 mins max\nJuggling, first touch, set piece practice\n\nSATURDAY\nTeam training or match — full intensity\n\nSUNDAY\nComplete rest. Foam roll, stretch, eat well, sleep 9 hours.\n\nMINDSET THIS WEEK: Before each session, set one specific goal. Review it after. Write it down.`,
    u18:`WEEKLY PLAN - UNDER 18\n\nFull performance week. This is the standard elite youth players train to.\n\nMONDAY\nGym — Lower body strength\nBack squat, trap bar deadlift, hip thrust, Nordic curl\n\nTUESDAY\nTechnical and tactical — 75 mins\nIndividual skill work, positional drills, shooting, set pieces\n\nWEDNESDAY\nGym — Upper body and power\nBench, pull-ups, rows, plyometrics, core\n\nTHURSDAY\nMatch fitness — 60 mins\nHigh intensity intervals, transition runs, 1v1s\n\nFRIDAY\nActivation and preparation\n30 min light technical work, mobility, mental preparation\n\nSATURDAY\nMatch — maximum effort, full focus\n\nSUNDAY\nActive recovery — light walk, foam roll, full stretch\nEat anti-inflammatory foods, hydrate, sleep 9 hours\n\nNUTRITION: Hit 1.5g protein per kg bodyweight every day this week. Track it if you have to.`,
    adult:`WEEKLY PLAN - ADULT\n\nRealistic plan for players with work and family commitments.\n\nMONDAY\nGym — 45 mins\nStrength focus: deadlifts, squats, upper body compound movements\n\nTUESDAY\nTechnical solo session — 30-45 mins\nWall passing, shooting, weak foot, first touch\n\nWEDNESDAY\nActive recovery or rest\nFoam roll, stretch, walk\n\nTHURSDAY\nTeam training or match\nGive full effort — this is your main session\n\nFRIDAY\nLight activation — 20 mins\nAgility, mobility, mental preparation for weekend match\n\nSATURDAY\nMatch — full intensity\n\nSUNDAY\nRest and recovery\nEat well, hydrate, sleep — do not underestimate this\n\nKEY PRINCIPLE: Two focused sessions plus your team session is enough to improve. Do not burn out trying to do everything. Consistency over months beats intensity over weeks.`,
    vet:`WEEKLY PLAN - VETERAN (35+)\n\nA sustainable week that keeps you playing and enjoying the game for years to come.\n\nMONDAY\nMobility and light gym — 40 mins\nFoam roll, hip mobility, goblet squats, resistance band work, balance exercises\n\nTUESDAY\nTechnical ball work — 30 mins\nLight passing, touch work, gentle shooting. No intensity — this is skill maintenance.\n\nWEDNESDAY\nRest or light walk\nLet your body recover. This is not optional at 35+.\n\nTHURSDAY\nTeam training\nFocus on positioning and communication — use your experience\n\nFRIDAY\nActivation — 20 mins\nLight movement, stretch, mental preparation\n\nSATURDAY\nMatch — enjoy every minute\n\nSUNDAY\nFull recovery day\nFoam roll everything, long stretch, anti-inflammatory meal, early night\n\nGOLDEN RULES FOR VETERANS:\n1. Never skip your warm-up\n2. Never skip your cool-down\n3. Sleep is your best recovery tool\n4. Enjoy the game — that is why you are still playing`
  }
};

function getAdvice(type, bracket, pos){
  const base = ADVICE[type]?.[bracket] || ADVICE[type]?.adult || '';
  // Add position-specific note at the end
  const posNotes = {
    'Goalkeeper': '\n\nGOALKEEPER SPECIFIC: Focus extra gym time on explosive hip hinge movements and lateral bounds. Your distribution is as important as your shot-stopping — include passing and kicking technique in every ball session.',
    'Centre Back': '\n\nCENTRE BACK SPECIFIC: Prioritise aerial strength and posterior chain work. Communication is a skill — practise it consciously every training session.',
    'Full Back': '\n\nFULL BACK SPECIFIC: You need the engine of a midfielder and the defensive instincts of a centre back. Repeat sprint ability is your key fitness quality — train for it.',
    'Defensive Mid': '\n\nDEFENSIVE MID SPECIFIC: Your positioning and reading of the game matters more than your athleticism. Study the game. Know where danger comes from before it arrives.',
    'Central Mid': '\n\nCENTRAL MID SPECIFIC: You cover more ground than any other position. Aerobic base is critical. Box to box running should feature in every fitness session.',
    'Attacking Mid': '\n\nATTACKING MID SPECIFIC: Your creativity comes from confidence. Train your weak foot and your shooting until both feel natural. Freedom on the ball comes from technical certainty.',
    'Winger': '\n\nWINGER SPECIFIC: Sprint mechanics and acceleration are your priority. Work on your first step from standing. Your crossing and cutting inside should be equally dangerous.',
    'Striker': '\n\nSTRIKER SPECIFIC: Finishing is a skill that must be trained under fatigue. Always end sessions with shooting when tired. Movement and runs matter as much as finishing ability.',
  };
  return base + (posNotes[pos]||'');
}

/* ===== AI PLAN ===== */
function renderAI(){
  const p=state.profile;
  if(!p.name||!p.ageBracket){
    return`<div class="section-title">My Plan</div><div class="empty-state"><i class="ti ti-user"></i>Set up your profile first to get your personalised plan.</div>`;
  }
  const current = state.profile.currentAdvice||null;
  return`<div class="section-title">My Plan</div>
  <div class="section-sub">Personalised plans for ${p.name}</div>
  <div class="card" style="margin-bottom:10px">
    <div style="display:flex;align-items:center;gap:10px">
      <div style="width:36px;height:36px;border-radius:50%;background:rgba(0,229,255,0.12);border:2px solid var(--accent);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;color:var(--accent);flex-shrink:0">${initials(p.name)}</div>
      <div><div style="font-weight:700;font-size:14px">${p.name}</div><div style="font-size:11px;color:var(--muted)">${p.pos} · ${bracketLabel(p.ageBracket)} · Age ${p.age}</div></div>
    </div>
  </div>
  <div class="quick-grid">
    <button class="btn btn-sm${state.profile.currentAdviceType==='gym'?' btn-accent':''}" onclick="showAdvice('gym')" style="justify-content:center"><i class="ti ti-barbell"></i>Gym Plan</button>
    <button class="btn btn-sm${state.profile.currentAdviceType==='nutrition'?' btn-accent':''}" onclick="showAdvice('nutrition')" style="justify-content:center"><i class="ti ti-apple"></i>Nutrition</button>
    <button class="btn btn-sm${state.profile.currentAdviceType==='mindset'?' btn-accent':''}" onclick="showAdvice('mindset')" style="justify-content:center"><i class="ti ti-brain"></i>Mindset</button>
    <button class="btn btn-sm${state.profile.currentAdviceType==='plan'?' btn-accent':''}" onclick="showAdvice('plan')" style="justify-content:center"><i class="ti ti-calendar"></i>Weekly Plan</button>
  </div>
  ${current?`<div>
    <div class="ai-label" style="margin-bottom:6px"><i class="ti ti-robot" style="font-size:13px;color:var(--accent)"></i>Your ${state.profile.currentAdviceType==='gym'?'Gym Plan':state.profile.currentAdviceType==='nutrition'?'Nutrition Plan':state.profile.currentAdviceType==='mindset'?'Mindset Plan':'Weekly Plan'}</div>
    <div class="ai-bubble">${current.replace(/\n\n/g,'<br><br>').replace(/\n/g,'<br>')}</div>
  </div>`:`<div class="empty-state" style="padding:20px"><i class="ti ti-robot" style="font-size:32px;display:block;margin-bottom:8px"></i>Tap a button above to get your personalised plan — works offline too!</div>`}`;
}

function showAdvice(type){
  const p=state.profile;
  const advice = getAdvice(type, p.ageBracket||'adult', p.pos||'Striker');
  state.profile.currentAdvice = advice;
  state.profile.currentAdviceType = type;
  save();
  render();
  setTimeout(()=>{
    const el=document.querySelector('.ai-bubble');
    if(el)el.scrollIntoView({behavior:'smooth',block:'start'});
  },100);
}

function attachHandlers(){}

render();

if('serviceWorker' in navigator){
  const swCode=`const CACHE='pzone-v1';self.addEventListener('install',e=>{self.skipWaiting();});self.addEventListener('activate',e=>{self.clients.claim();});self.addEventListener('fetch',e=>{e.respondWith(fetch(e.request).catch(()=>caches.match(e.request)));});`;
  const blob=new Blob([swCode],{type:'application/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
}
